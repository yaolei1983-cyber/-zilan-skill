name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint Python helpers
        run: python -m ruff check scripts tests

      - name: Validate repository invariants
        run: python scripts/validate_zilan_repo.py --check-generated --strict-yaml

      - name: Run tests
        run: python -m pytest

      - name: Smoke-test Agama search CLI
        run: python scripts/search_agama.py --terms "無我|非我|緣起" --limit 5
